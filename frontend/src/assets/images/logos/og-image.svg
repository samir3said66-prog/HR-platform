<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgOg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e3a8a"/>
      <stop offset="55%"  stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cardOg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgOg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left decorative circle glow -->
  <circle cx="120" cy="315" r="280" fill="#3b82f6" fill-opacity="0.10"/>
  <!-- Right decorative circle glow -->
  <circle cx="1100" cy="330" r="220" fill="#06b6d4" fill-opacity="0.08"/>

  <!-- Logo mark (mini favicon) top-left -->
  <rect x="64" y="56" width="52" height="52" rx="12" fill="#3b82f6"/>
  <circle cx="82" cy="72" r="7" fill="#ffffff"/>
  <path d="M70 88c0-6.6 5.4-12 12-12s12 5.4 12 12"
        stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <rect x="97"  y="72" width="7"  height="14" rx="2" fill="#93c5fd"/>
  <rect x="107" y="67" width="7"  height="19" rx="2" fill="#ffffff"/>

  <!-- Brand name -->
  <text x="132" y="93" font-family="system-ui,-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#ffffff" letter-spacing="0.5">HR Analytics Platform</text>

  <!-- Main headline -->
  <text x="64" y="260" font-family="system-ui,-apple-system,sans-serif"
        font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Enterprise HR
  </text>
  <text x="64" y="350" font-family="system-ui,-apple-system,sans-serif"
        font-size="72" font-weight="800" fill="#93c5fd" letter-spacing="-1">
    Management Platform
  </text>

  <!-- Sub-text -->
  <text x="64" y="420" font-family="system-ui,-apple-system,sans-serif"
        font-size="28" font-weight="400" fill="#bfdbfe" letter-spacing="0.2">
    Attendance · Payroll · Performance · Analytics · Recruitment
  </text>

  <!-- Feature pills -->
  <rect x="64"  y="460" width="148" height="40" rx="20" fill="#ffffff" fill-opacity="0.12"/>
  <text x="138" y="485" font-family="system-ui,-apple-system,sans-serif"
        font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">Face Recognition</text>

  <rect x="224" y="460" width="120" height="40" rx="20" fill="#ffffff" fill-opacity="0.12"/>
  <text x="284" y="485" font-family="system-ui,-apple-system,sans-serif"
        font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">GPS Tracking</text>

  <rect x="356" y="460" width="144" height="40" rx="20" fill="#ffffff" fill-opacity="0.12"/>
  <text x="428" y="485" font-family="system-ui,-apple-system,sans-serif"
        font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">Auto Payroll</text>

  <rect x="512" y="460" width="130" height="40" rx="20" fill="#ffffff" fill-opacity="0.12"/>
  <text x="577" y="485" font-family="system-ui,-apple-system,sans-serif"
        font-size="17" font-weight="600" fill="#ffffff" text-anchor="middle">Real-time Sync</text>

  <!-- Right: Dashboard mockup card -->
  <rect x="760" y="100" width="390" height="440" rx="20"
        fill="url(#cardOg)" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Card header -->
  <rect x="760" y="100" width="390" height="54" rx="20" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="793" cy="127" r="9" fill="#60a5fa"/>
  <text x="812" y="132" font-family="system-ui,-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#ffffff">Dashboard Overview</text>

  <!-- KPI row -->
  <rect x="780" y="174" width="100" height="70" rx="10" fill="#ffffff" fill-opacity="0.08"/>
  <text x="830" y="200" font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#93c5fd" text-anchor="middle">EMPLOYEES</text>
  <text x="830" y="228" font-family="system-ui,-apple-system,sans-serif"
        font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle">1,284</text>

  <rect x="895" y="174" width="100" height="70" rx="10" fill="#ffffff" fill-opacity="0.08"/>
  <text x="945" y="200" font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#93c5fd" text-anchor="middle">ATTENDANCE</text>
  <text x="945" y="228" font-family="system-ui,-apple-system,sans-serif"
        font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle">96.4%</text>

  <rect x="1010" y="174" width="120" height="70" rx="10" fill="#ffffff" fill-opacity="0.08"/>
  <text x="1070" y="200" font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="#93c5fd" text-anchor="middle">PAYROLL</text>
  <text x="1070" y="228" font-family="system-ui,-apple-system,sans-serif"
        font-size="26" font-weight="800" fill="#ffffff" text-anchor="middle">$2.4M</text>

  <!-- Mini bar chart in card -->
  <rect x="780" y="268" width="350" height="160" rx="10" fill="#ffffff" fill-opacity="0.05"/>
  <text x="796" y="288" font-family="system-ui,-apple-system,sans-serif"
        font-size="12" fill="#93c5fd">Monthly Performance</text>
  <!-- bars -->
  <rect x="796" y="358" width="22" height="60"  rx="4" fill="#3b82f6" fill-opacity="0.7"/>
  <rect x="826" y="338" width="22" height="80"  rx="4" fill="#3b82f6" fill-opacity="0.7"/>
  <rect x="856" y="318" width="22" height="100" rx="4" fill="#3b82f6" fill-opacity="0.9"/>
  <rect x="886" y="308" width="22" height="110" rx="4" fill="#60a5fa"/>
  <rect x="916" y="298" width="22" height="120" rx="4" fill="#93c5fd"/>
  <rect x="946" y="288" width="22" height="130" rx="4" fill="#ffffff"/>
  <rect x="976" y="308" width="22" height="110" rx="4" fill="#93c5fd"/>
  <rect x="1006" y="318" width="22" height="100" rx="4" fill="#60a5fa"/>
  <rect x="1036" y="298" width="22" height="120" rx="4" fill="#3b82f6" fill-opacity="0.9"/>
  <rect x="1066" y="278" width="22" height="140" rx="4" fill="#93c5fd"/>
  <!-- trend line over bars -->
  <polyline points="807,378 837,358 867,338 897,328 927,318 957,308 987,328 1017,338 1047,318 1077,298"
            stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Bottom URL -->
  <text x="64" y="588" font-family="system-ui,-apple-system,sans-serif"
        font-size="20" font-weight="500" fill="#93c5fd" fill-opacity="0.7">hrplatform.com</text>
  <text x="1136" y="588" font-family="system-ui,-apple-system,sans-serif"
        font-size="20" font-weight="500" fill="#93c5fd" fill-opacity="0.5" text-anchor="end">© 2026</text>
</svg>
