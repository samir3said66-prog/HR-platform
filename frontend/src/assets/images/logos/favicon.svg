<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Main background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="128" cy="128" r="128" fill="url(#bgGradient)"/>
  
  <!-- HR Platform Icon: People + Chart symbolism -->
  <!-- Left person silhouette (higher quality) -->
  <circle cx="80" cy="70" r="16" fill="#ffffff"/>
  <path d="M 62 105 L 62 155 M 80 120 L 80 155 M 98 105 L 98 155 M 62 130 L 98 130" 
        stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="0"/>
  
  <!-- Right person silhouette -->
  <circle cx="176" cy="70" r="16" fill="#ffffff"/>
  <path d="M 158 105 L 158 155 M 176 120 L 176 155 M 194 105 L 194 155 M 158 130 L 194 130" 
        stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Analytics chart bars -->
  <g transform="translate(90, 160)">
    <!-- Bar 1 -->
    <rect x="0" y="40" width="16" height="30" fill="#06b6d4" rx="3"/>
    <!-- Bar 2 -->
    <rect x="22" y="20" width="16" height="50" fill="#ffffff" rx="3"/>
    <!-- Bar 3 -->
    <rect x="44" y="0" width="16" height="70" fill="#06b6d4" rx="3"/>
  </g>
  
  <!-- Accent elements -->
  <circle cx="35" cy="200" r="5" fill="#06b6d4" opacity="0.8"/>
  <circle cx="221" cy="215" r="5" fill="#06b6d4" opacity="0.8"/>
</svg>