<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <linearGradient id="bg192" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine192" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="url(#bg192)"/>
  <!-- Subtle top shine -->
  <rect width="192" height="96" rx="40" fill="url(#shine192)"/>

  <!-- Left: Person -->
  <circle cx="62" cy="54" r="18" fill="#ffffff"/>
  <path d="M30 100c0-17.7 14.3-32 32-32s32 14.3 32 32"
        stroke="#ffffff" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Divider -->
  <line x1="103" y1="28" x2="103" y2="164" stroke="#ffffff" stroke-width="2" stroke-opacity="0.18"/>

  <!-- Right: Bar chart -->
  <rect x="108" y="74"  width="18" height="66" rx="5" fill="#93c5fd"/>
  <rect x="132" y="54"  width="18" height="86" rx="5" fill="#ffffff"/>
  <rect x="156" y="90"  width="18" height="50" rx="5" fill="#93c5fd"/>

  <!-- Trend line over bars -->
  <polyline points="117,118 141,82 165,106" stroke="#dbeafe" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="117" cy="118" r="5" fill="#bfdbfe"/>
  <circle cx="141" cy="82"  r="5" fill="#bfdbfe"/>
  <circle cx="165" cy="106" r="5" fill="#bfdbfe"/>

  <!-- Bottom label strip -->
  <rect x="30" y="148" width="132" height="6" rx="3" fill="#ffffff" fill-opacity="0.15"/>
</svg>
