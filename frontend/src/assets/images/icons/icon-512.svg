<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg512" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="shine512" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Maskable safe-zone: inner 80% circle for Android adaptive icons -->
    <clipPath id="safe512">
      <circle cx="256" cy="256" r="205"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg512)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="108" fill="url(#shine512)"/>

  <!-- Left: Person -->
  <circle cx="164" cy="144" r="48" fill="#ffffff"/>
  <path d="M80 264c0-46.4 37.6-84 84-84s84 37.6 84 84"
        stroke="#ffffff" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Divider -->
  <line x1="276" y1="72" x2="276" y2="440" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.18"/>

  <!-- Right: Bar chart — 3 bars -->
  <rect x="288" y="196" width="48" height="176" rx="12" fill="#93c5fd"/>
  <rect x="352" y="144" width="48" height="228" rx="12" fill="#ffffff"/>
  <rect x="416" y="240" width="48" height="132" rx="12" fill="#93c5fd"/>

  <!-- Trend line over bars -->
  <polyline points="312,314 376,218 440,282" stroke="#dbeafe" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="312" cy="314" r="13" fill="#bfdbfe"/>
  <circle cx="376" cy="218" r="13" fill="#bfdbfe"/>
  <circle cx="440" cy="282" r="13" fill="#bfdbfe"/>

  <!-- Small decorative accent dots bottom-left -->
  <circle cx="88"  cy="400" r="8" fill="#60a5fa" fill-opacity="0.5"/>
  <circle cx="108" cy="420" r="5" fill="#60a5fa" fill-opacity="0.35"/>

  <!-- Bottom label strip -->
  <rect x="80" y="396" width="352" height="12" rx="6" fill="#ffffff" fill-opacity="0.12"/>
</svg>
