<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>HR Analytics Platform - Complete Employee Management, Payroll & Attendance System</title>
    <base href="/" />
    
    <!-- Viewport & Basic Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="color-scheme" content="light dark" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- Comprehensive SEO Meta Tags -->
    <meta name="description" content="Complete enterprise HR management platform with attendance tracking via face recognition & GPS, accurate payroll calculation, performance analytics, recruitment tools, and real-time workforce insights. Trusted by 500+ companies in MENA region." />
    <meta name="keywords" content="HR platform, payroll system, attendance tracking, face recognition, GPS tracking, employee management, performance reviews, recruitment, analytics, HRMS, cloud HR, enterprise HR, workforce management, salary calculation, leave management" />
    <meta name="author" content="HR Platform Team" />
    <meta name="application-name" content="HR Analytics Platform" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HR Platform" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Additional SEO Tags -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="revisit-after" content="7 days" />
    <meta name="language" content="en-US" />
    <meta name="copyright" content="© 2024-2026 HR Platform. All rights reserved." />
    
    <!-- Open Graph (Social Media) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HR Analytics Platform - Enterprise Employee Management" />
    <meta property="og:description" content="Complete HR management solution with attendance, payroll, performance & analytics. Face recognition attendance, accurate salary calculation, 100% error-free." />

    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_SA" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HR Analytics Platform - Enterprise HR Management" />
    <meta name="twitter:description" content="Complete HR management: attendance tracking with face recognition, automated payroll, performance analytics & recruitment." />
    <meta name="twitter:image" content="https://hrplatform.com/assets/images/logos/twitter-image.svg" />
    <meta name="twitter:site" content="@hrplatform" />
    <meta name="twitter:creator" content="@hrplatform" />
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "HR Analytics Platform",
      "description": "Enterprise HR management platform with attendance, payroll, performance analytics, and recruitment tools",
      "url": "https://hrplatform.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free trial available"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "500"
      }
    }
    </script>

    <!-- Additional Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "HR Analytics Platform",
      "url": "https://hrplatform.com",
      "logo": "https://hrplatform.com/assets/images/icons/icon-512.svg",
      "description": "Enterprise HR management and analytics platform",
      "sameAs": [
        "https://twitter.com/hrplatform",
        "https://linkedin.com/company/hrplatform",
        "https://facebook.com/hrplatform"
      ],
      "contact": {
        "@type": "ContactPoint",
        "telephone": "+1-800-HR-PLATFORM",
        "contactType": "Customer Support"
      }
    }
    </script>
    
    <!-- =============================================
         Favicon & Icon Set
         Primary:  /favicon.svg        (browser tab, all modern browsers)
         Fallback: /favicon.ico        (legacy browsers)
         iOS:      /apple-touch-icon.svg (home screen, 180×180)
         Sizes:    /assets/images/icons/icon-{16|32|48|64|96|192|512}.svg
         ============================================= -->
    <!-- Primary SVG favicon — scales perfectly at all sizes -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- ICO fallback for IE / old browsers -->
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico" />
    <!-- Sized PNG-equivalent icons for explicit size requests -->
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/icon-16.svg"  sizes="16x16" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/icon-32.svg"  sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/icon-48.svg"  sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/icon-64.svg"  sizes="64x64" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/icon-96.svg"  sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/icons/icon-192.svg" sizes="192x192" />
    <!-- iOS / iPadOS home screen icon (180×180, no rounding — system clips) -->
    <link rel="apple-touch-icon" type="image/svg+xml" href="/apple-touch-icon.svg" sizes="180x180" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://hrplatform.com/" />
    
    <!-- Alternate Language Links -->
    <link rel="alternate" hreflang="en" href="https://hrplatform.com/" />
    <link rel="alternate" hreflang="ar" href="https://hrplatform.com/ar" />
    <link rel="alternate" hreflang="x-default" href="https://hrplatform.com/" />
    
    <!-- Security & Performance Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; font-src 'self' data: https://cdn.jsdelivr.net; connect-src 'self' https: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" />
    <meta http-equiv="Permissions-Policy" content="geolocation=(self), microphone=(), camera=()" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    
    <!-- DNS Prefetch & Resource Hints -->
    <link rel="dns-prefetch" href="https://api.hrplatform.com" />
    <link rel="dns-prefetch" href="https://cdn.hrplatform.com" />
    <link rel="preconnect" href="https://api.hrplatform.com" crossorigin />
    <link rel="preconnect" href="https://cdn.hrplatform.com" crossorigin />
    <link rel="prefetch" href="https://api.hrplatform.com/health" />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" as="font"  href="/assets/fonts/main.woff2" type="font/woff2" crossorigin />
    <link rel="preload" as="image" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preload" as="image" href="/assets/images/icons/icon-192.svg" type="image/svg+xml" />
    
    <!-- Performance Optimization -->
    <meta http-equiv="Cache-Control" content="public, max-age=3600" />
    
    <!-- Browser Theme -->
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
  </head>
