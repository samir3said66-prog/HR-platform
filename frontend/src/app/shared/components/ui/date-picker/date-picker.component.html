<div class="relative w-full">
  <label
    *ngIf="label"
    [for]="id"
    class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2"
  >
    {{ label }}
  </label>

  <div class="flex gap-2">
    <!-- Start Date Input -->
    <input
      [id]="id"
      type="text"
      [value]="formatDate(selectedStartDate())"
      (click)="toggleCalendar('start')"
      (keydown)="handleInputKeydown($event, 'start')"
      readonly
      placeholder="Select date"
      [attr.aria-label]="ariaLabel || label"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-haspopup]="'dialog'"
      [disabled]="disabled"
      class="flex-1 px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed"
    />

    <!-- End Date Input (Range Mode) -->
    <input
      *ngIf="range"
      type="text"
      [value]="formatDate(selectedEndDate())"
      (click)="toggleCalendar('end')"
      (keydown)="handleInputKeydown($event, 'end')"
      readonly
      placeholder="Select end date"
      [attr.aria-label]="'End ' + (label || 'date')"
      [disabled]="disabled"
      class="flex-1 px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed"
    />
  </div>

  <!-- Calendar Popup -->
  <div
    *ngIf="isOpen()"
    role="dialog"
    [attr.aria-label]="'Date picker for ' + (label || 'date')"
    [class]="getCalendarClasses()"
  >
    <!-- Month/Year Navigation -->
    <div class="flex items-center justify-between mb-4 px-4 pt-4">
      <button
        type="button"
        (click)="previousMonth()"
        [attr.aria-label]="'Previous month'"
        class="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition-colors"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
      </button>

      <div class="text-sm font-semibold text-slate-900 dark:text-slate-100">
        {{ getMonthYearDisplay() }}
      </div>

      <button
        type="button"
        (click)="nextMonth()"
        [attr.aria-label]="'Next month'"
        class="p-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition-colors"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 5l7 7-7 7"
          ></path>
        </svg>
      </button>
    </div>

    <!-- Day Headers -->
    <div class="grid grid-cols-7 gap-1 px-4 mb-2">
      <div
        *ngFor="let day of dayHeaders"
        class="text-center text-xs font-semibold text-slate-600 dark:text-slate-400 py-2"
      >
        {{ day }}
      </div>
    </div>

    <!-- Calendar Days -->
    <div class="grid grid-cols-7 gap-1 px-4 pb-4">
      <button
        *ngFor="let day of calendarDays()"
        type="button"
        (click)="selectDate(day.date)"
        (keydown)="handleDayKeydown($event, day.date)"
        [disabled]="!day.isCurrentMonth || day.isDisabled"
        [class]="getDayClasses(day)"
        [attr.aria-label]="formatDate(day.date)"
        [attr.aria-selected]="isDateSelected(day.date)"
      >
        {{ day.date.getDate() }}
      </button>
    </div>

    <!-- Range Info -->
    <div
      *ngIf="range && selectedStartDate() && selectedEndDate()"
      class="px-4 pb-4 text-xs text-slate-600 dark:text-slate-400"
    >
      {{ getDaysDifference() }} days selected
    </div>
  </div>

  <!-- Error Message -->
  <p *ngIf="error" class="mt-1 text-sm text-red-600 dark:text-red-400" role="alert">
    {{ error }}
  </p>
</div>
