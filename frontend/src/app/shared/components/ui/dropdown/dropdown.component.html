<div class="relative inline-block">
  <!-- Trigger Button -->
  <button
    #triggerButton
    (click)="toggle()"
    [attr.aria-haspopup]="true"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-controls]="menuId"
    type="button"
  >
    {{ triggerLabel }}
    <svg
      width="16"
      height="16"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      [style.transform]="isOpen() ? 'rotate(180deg)' : 'rotate(0deg)'"
      [style.transition]="'transform 200ms ease-out'"
    >
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </button>

  <!-- Dropdown Menu -->
  <div
    *ngIf="isOpen()"
    #menu
    [id]="menuId"
    [ngClass]="getMenuPositionClasses()"
    role="menu"
    (keydown)="onMenuKeyDown($event)"
  >
    <div>
      <ng-container *ngFor="let item of items; let i = index">
        <!-- Menu Item -->
        <button
          *ngIf="!item.submenu"
          (click)="selectItem(item)"
          (mouseenter)="highlightedIndex.set(i)"
          role="menuitem"
          type="button"
          [attr.aria-label]="item.label"
        >
          <svg *ngIf="item.icon" width="16" height="16" [innerHTML]="item.icon"></svg>
          <span>{{ item.label }}</span>
          <span *ngIf="item.badge" class="badge">{{ item.badge }}</span>
        </button>

        <!-- Submenu Item -->
        <div
          *ngIf="item.submenu"
          class="relative group"
          (mouseenter)="highlightedIndex.set(i)"
          (mouseleave)="highlightedIndex.set(-1)"
        >
          <button
            (click)="toggleSubmenu(i)"
            role="menuitem"
            [attr.aria-haspopup]="true"
            [attr.aria-expanded]="expandedSubmenu() === i"
            type="button"
          >
            <span style="display: flex; align-items: center; gap: 0.75rem;">
              <svg *ngIf="item.icon" width="16" height="16" [innerHTML]="item.icon"></svg>
              {{ item.label }}
            </span>
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
          </button>

          <!-- Submenu -->
          <div
            *ngIf="expandedSubmenu() === i"
            role="menu"
            style="position: absolute; left: 100%; top: 0; margin-left: 0.25rem; width: 200px; z-index: 201;"
          >
            <button
              *ngFor="let subitem of item.submenu"
              (click)="selectItem(subitem)"
              role="menuitem"
              type="button"
            >
              <svg *ngIf="subitem.icon" width="16" height="16" [innerHTML]="subitem.icon"></svg>
              <span>{{ subitem.label }}</span>
            </button>
          </div>
        </div>

        <!-- Divider -->
        <div *ngIf="item.divider" role="separator"></div>
      </ng-container>
    </div>
  </div>
</div>
