apiVersion: v1
kind: Namespace
metadata:
  name: hr-analytics

---
# ConfigMap for application configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: hr-analytics-config
  namespace: hr-analytics
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  API_TIMEOUT: "30000"
  WEBSOCKET_TIMEOUT: "60000"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: hr-analytics-secrets
  namespace: hr-analytics
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:password@db:5432/hr_analytics"
  JWT_SECRET: "your-jwt-secret-key"
  SENTRY_DSN: "https://your-sentry-dsn"

---
# Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hr-analytics
  namespace: hr-analytics

---
# Blue Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-analytics-blue
  namespace: hr-analytics
  labels:
    app: hr-analytics
    version: blue
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hr-analytics
      version: blue
  template:
    metadata:
      labels:
        app: hr-analytics
        version: blue
    spec:
      serviceAccountName: hr-analytics
      containers:
      - name: hr-analytics
        image: ghcr.io/hr-analytics-platform:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 4200
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        # Environment variables
        envFrom:
        - configMapRef:
            name: hr-analytics-config
        - secretRef:
            name: hr-analytics-secrets
        
        # Resource limits
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache
      
      # Pod security context
      securityContext:
        fsGroup: 1001
      
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      
      # Affinity rules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - hr-analytics
              topologyKey: kubernetes.io/hostname

---
# Green Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hr-analytics-green
  namespace: hr-analytics
  labels:
    app: hr-analytics
    version: green
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hr-analytics
      version: green
  template:
    metadata:
      labels:
        app: hr-analytics
        version: green
    spec:
      serviceAccountName: hr-analytics
      containers:
      - name: hr-analytics
        image: ghcr.io/hr-analytics-platform:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 4200
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        envFrom:
        - configMapRef:
            name: hr-analytics-config
        - secretRef:
            name: hr-analytics-secrets
        
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /app/.cache
      
      securityContext:
        fsGroup: 1001
      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - hr-analytics
              topologyKey: kubernetes.io/hostname

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: hr-analytics
  namespace: hr-analytics
  labels:
    app: hr-analytics
spec:
  type: LoadBalancer
  selector:
    app: hr-analytics
    version: blue  # Initially points to blue
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hr-analytics-hpa
  namespace: hr-analytics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hr-analytics-blue
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hr-analytics-network-policy
  namespace: hr-analytics
spec:
  podSelector:
    matchLabels:
      app: hr-analytics
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 4200
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 5432
